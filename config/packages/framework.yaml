# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'
    session: true
    http_client:
        default_options:
            proxy: null
            no_proxy: 'localhost, 127.0.0.1'
            verify_peer: false
            verify_host: false

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file